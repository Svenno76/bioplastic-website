{{ define "main" }}
<main>
  <div style="max-width: 50rem; margin: 0 auto; padding: 2rem;">
    <article>
      <header style="margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid #e5e7eb;">
        <h1 style="font-size: 2.5rem; color: var(--color-primary-dark); margin-bottom: 1rem; line-height: 1.2;">{{ .Title }}</h1>
      </header>

      <div style="font-size: 1.125rem; line-height: 1.8; color: var(--color-text-dark);">
        {{ .Content }}
      </div>

      {{ if .Pages }}
      <div style="margin-top: 3rem;">
        {{ range .Pages }}
        <div style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #e5e7eb;">
          <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;"><a href="{{ .Permalink }}" style="color: var(--color-primary); text-decoration: none;">{{ .Title }}</a></h2>
          <p style="color: var(--color-text-muted);">{{ .Summary | plainify | truncate 150 }}</p>
        </div>
        {{ end }}
      </div>
      {{ end }}
    </article>
  </div>
</main>
{{ end }}
