<header class="site-header" style="background: linear-gradient(135deg, #faf9f7 0%, #f7f4f0 100%) !important; border-bottom: 1px solid #f0ede7 !important; box-shadow: 0 2px 12px rgba(29, 77, 69, 0.08) !important;">
  <div class="site-branding">
    <a href="/" class="site-title" style="color: #1e4d45 !important;">
      🌱 Bioplastics Portal
    </a>
    <button class="hamburger-menu" aria-label="Toggle navigation menu" onclick="toggleMobileMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="site-navigation" id="mobile-menu">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" style="color: #1a2a28 !important;">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>

<script>
  function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    const button = document.querySelector('.hamburger-menu');
    menu.classList.toggle('active');
    button.classList.toggle('active');
  }

  // Close menu when a link is clicked
  document.querySelectorAll('.site-navigation a').forEach(link => {
    link.addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.remove('active');
      document.querySelector('.hamburger-menu').classList.remove('active');
    });
  });

  // Close menu when clicking outside
  document.addEventListener('click', (e) => {
    const header = document.querySelector('.site-header');
    if (!header.contains(e.target)) {
      document.getElementById('mobile-menu').classList.remove('active');
      document.querySelector('.hamburger-menu').classList.remove('active');
    }
  });
</script>
