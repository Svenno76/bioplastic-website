{{ define "main" }}
  <!-- Hero Section -->
  <div class="faq-hero">
    <div style="max-width: 50rem; margin: 0 auto;">
      <h1>Frequently Asked Questions</h1>
      <p>Everything you need to know about bioplastics — from basics to technical details.</p>
    </div>
  </div>

  <!-- FAQ Content -->
  <div style="max-width: 55rem; margin: 0 auto; padding: 3rem 2rem;">
    {{ .Content }}
  </div>

  <!-- Quick Facts Box -->
  <div style="max-width: 55rem; margin: 0 auto; padding: 0 2rem 2rem 2rem;">
    <div class="quick-facts">
      <h3>Quick Facts</h3>
      <div class="quick-facts-grid">
        <div>
          <div class="quick-facts-value">$10-12B</div>
          <div class="quick-facts-label">Market Size (2025)</div>
        </div>
        <div>
          <div class="quick-facts-value">$25-30B</div>
          <div class="quick-facts-label">Projected by 2030</div>
        </div>
        <div>
          <div class="quick-facts-value">15-18%</div>
          <div class="quick-facts-label">CAGR Growth Rate</div>
        </div>
        <div>
          <div class="quick-facts-value">2M+</div>
          <div class="quick-facts-label">Tonnes/Year Capacity</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleFaq(button) {
      const answer = button.nextElementSibling;
      const isOpen = button.classList.contains('active');
      document.querySelectorAll('.faq-question').forEach(btn => {
        btn.classList.remove('active');
        btn.nextElementSibling.classList.remove('open');
      });
      if (!isOpen) {
        button.classList.add('active');
        answer.classList.add('open');
      }
    }
  </script>
{{ end }}
