baseURL = 'https://bioplasticsportal.com/'
languageCode = 'en-us'
title = 'Bioplastics Portal'
theme = 'ananke'
enableRobotsTXT = true
ignoreFiles = ["^database/"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  featured_image = '/images/bioplastics-banner.jpg'
  recent_posts_number = 5
  custom_css = ["css/custom.css", "css/homepage.css"]
  description = "Your comprehensive resource for bioplastics research, news, and industry insights"

